<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Manager - Ingestión de CSV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }
        
        .status-ready {
            background: #d4edda;
            color: #155724;
        }
        
        .status-running {
            background: #fff3cd;
            color: #856404;
            animation: pulse 1.5s infinite;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 16px 0;
        }
        
        .stat-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
        }
        
        .stat-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }
        
        .action-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
            width: 100%;
        }
        
        .action-button:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .action-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 0.9em;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .logs-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        
        .logs-table thead {
            background: #f8f9fa;
        }
        
        .logs-table th,
        .logs-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
            font-size: 0.9em;
        }
        
        .logs-table th {
            font-weight: 600;
            color: #666;
        }
        
        .logs-table tbody tr:hover {
            background: #f8f9fa;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .badge.success {
            background: #d4edda;
            color: #155724;
        }
        
        .badge.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .badge.partial {
            background: #fff3cd;
            color: #856404;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Portfolio Manager</h1>
            <p>Gestión automática de ingestión de CSV</p>
        </div>
        
        <div class="grid">
            <!-- Panel de Control -->
            <div class="card">
                <h2>🎮 Control de Ingestión</h2>
                
                <div id="status-section">
                    <div style="margin-bottom: 16px;">
                        <strong>Estado:</strong>
                        <span id="status-badge" class="status-badge status-ready">Listo</span>
                    </div>
                    
                    <div id="message-section"></div>
                </div>
                
                <button id="trigger-btn" class="action-button" onclick="triggerIngest()">
                    ▶️ Procesar CSV
                </button>
                
                <button id="refresh-btn" class="action-button" onclick="refreshStatus()" 
                    style="background: #6c757d; margin-top: 8px;">
                    🔄 Actualizar Estado
                </button>
            </div>
            
            <!-- Estadísticas -->
            <div class="card">
                <h2>📈 Estadísticas</h2>
                
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">Archivos Pendientes</div>
                        <div class="stat-value" id="pending-files">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Última Ejecución</div>
                        <div class="stat-value" id="last-run" style="font-size: 0.9em;">--</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Histórico de Logs -->
        <div class="card">
            <h2>📋 Histórico de Ingestiones</h2>
            
            <table class="logs-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Duración</th>
                        <th>Procesados</th>
                        <th>Exitosos</th>
                        <th>Errores</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="logs-tbody">
                    <tr><td colspan="7" style="text-align: center; color: #999;">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        // Actualizar estado cada 2 segundos cuando está corriendo
        let updateInterval = null;
        
        async function refreshStatus() {
            try {
                const response = await fetch(`${API_URL}/ingest/status`);
                const data = await response.json();
                
                updateStatusUI(data);
                loadLogs();
            } catch (error) {
                showMessage('Error al conectar con la API: ' + error.message, 'error');
            }
        }
        
        function updateStatusUI(data) {
            const badge = document.getElementById('status-badge');
            const msgSection = document.getElementById('message-section');
            const pendingFiles = document.getElementById('pending-files');
            const lastRun = document.getElementById('last-run');
            
            pendingFiles.textContent = data.pending_files;
            
            if (data.last_run) {
                const date = new Date(data.last_run);
                lastRun.textContent = date.toLocaleString('es-AR');
            }
            
            if (data.running) {
                badge.className = 'status-badge status-running';
                badge.textContent = '⏳ Procesando...';
                document.getElementById('trigger-btn').disabled = true;
            } else {
                badge.className = 'status-badge status-ready';
                badge.textContent = '✓ Listo';
                document.getElementById('trigger-btn').disabled = false;
            }
            
            msgSection.innerHTML = '';
            if (data.message !== 'Ready') {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message ' + (data.message.startsWith('✓') ? 'success' : 'info');
                messageDiv.textContent = data.message;
                msgSection.appendChild(messageDiv);
            }
        }
        
        async function triggerIngest() {
            try {
                document.getElementById('trigger-btn').disabled = true;
                
                const response = await fetch(`${API_URL}/ingest/trigger`, {
                    method: 'POST'
                });
                
                if (response.status === 409) {
                    showMessage('Ingestión ya en progreso', 'error');
                    return;
                }
                
                if (response.status === 400) {
                    showMessage('No hay archivos para procesar en csv for ingest/', 'error');
                    document.getElementById('trigger-btn').disabled = false;
                    return;
                }
                
                showMessage('✓ Ingestión iniciada en background', 'success');
                
                // Actualizar estado cada 1 segundo
                if (updateInterval) clearInterval(updateInterval);
                updateInterval = setInterval(refreshStatus, 1000);
                
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
                document.getElementById('trigger-btn').disabled = false;
            }
        }
        
        async function loadLogs() {
            try {
                const response = await fetch(`${API_URL}/ingest/logs`);
                const data = await response.json();
                
                const tbody = document.getElementById('logs-tbody');
                tbody.innerHTML = '';
                
                if (data.logs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #999;">Sin historial</td></tr>';
                    return;
                }
                
                data.logs.forEach(log => {
                    const startTime = new Date(log.start_time);
                    const endTime = log.end_time ? new Date(log.end_time) : null;
                    const duration = endTime ? 
                        `${Math.round((endTime - startTime) / 1000)}s` : 'En progreso';
                    
                    const statusBadge = `<span class="badge ${log.status}">${log.status}</span>`;
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${startTime.toLocaleString('es-AR')}</td>
                        <td>${duration}</td>
                        <td>${log.files_processed}</td>
                        <td>${log.files_success}</td>
                        <td>${log.files_error}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button onclick="viewLog('${log.session_id}')" style="
                                background: none;
                                border: none;
                                color: #667eea;
                                cursor: pointer;
                                text-decoration: underline;
                            ">Ver</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error cargando logs:', error);
            }
        }
        
        function viewLog(sessionId) {
            alert('Detalles del log: ' + sessionId);
            // TODO: Implementar modal con detalles
        }
        
        function showMessage(text, type) {
            const msgSection = document.getElementById('message-section');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + type;
            messageDiv.textContent = text;
            msgSection.innerHTML = '';
            msgSection.appendChild(messageDiv);
        }
        
        // Cargar estado inicial
        refreshStatus();
        
        // Auto-refresh cada 5 segundos
        setInterval(() => {
            if (!document.getElementById('status-badge').textContent.includes('Procesando')) {
                refreshStatus();
            }
        }, 5000);
    </script>
</body>
</html>
